html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;gjm-selection-limit&quot; class=&quot;gjm-limit-root&quot;&gt;
  &lt;div class=&quot;viz-row gjm-limit-key&quot; aria-hidden=&quot;true&quot;&gt;
    &lt;span class=&quot;gjm-limit-key-item&quot;&gt;&lt;span class=&quot;gjm-limit-swatch gjm-limit-n32&quot;&gt;&lt;/span&gt;N = 32&lt;/span&gt;
    &lt;span class=&quot;gjm-limit-key-item&quot;&gt;&lt;span class=&quot;gjm-limit-swatch gjm-limit-n128&quot;&gt;&lt;/span&gt;N = 128&lt;/span&gt;
    &lt;span class=&quot;gjm-limit-key-item&quot;&gt;&lt;span class=&quot;gjm-limit-swatch gjm-limit-n512&quot;&gt;&lt;/span&gt;N = 512&lt;/span&gt;

  &lt;/div&gt;

  &lt;div class=&quot;gjm-limit-stage&quot;&gt;
    &lt;canvas id=&quot;gjm-limit-canvas&quot; role=&quot;img&quot; aria-label=&quot;A one-dimensional interacting Brownian particle system and three stationary empirical cumulative distributions for increasing population sizes, compared with the minimal Fisher–KPP wave.&quot;&gt;&lt;/canvas&gt;
  &lt;/div&gt;

  &lt;div class=&quot;viz-controls&quot;&gt;

    &lt;span id=&quot;gjm-limit-time&quot;&gt;t = 0.0&lt;/span&gt;
    &lt;span aria-hidden=&quot;true&quot;&gt;·&lt;/span&gt;
    &lt;span id=&quot;gjm-limit-distance&quot;&gt;sup distances —&lt;/span&gt;
  &lt;/div&gt;
  &lt;p id=&quot;gjm-limit-summary&quot; class=&quot;sr-only&quot; aria-live=&quot;polite&quot;&gt;&lt;/p&gt;

&lt;style&gt;

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&quot;gjm-selection-limit&quot;);
  if (!root) return;

  const canvas = root.querySelector(&quot;#gjm-limit-canvas&quot;);
  const context = canvas.getContext(&quot;2d&quot;);
  const toggleButton = root.querySelector(&quot;#gjm-limit-toggle&quot;);
  const resetButton = root.querySelector(&quot;#gjm-limit-reset&quot;);
  const timeLabel = root.querySelector(&quot;#gjm-limit-time&quot;);
  const distanceLabel = root.querySelector(&quot;#gjm-limit-distance&quot;);
  const summary = root.querySelector(&quot;#gjm-limit-summary&quot;);

  const POPULATIONS = [32, 128, 512];
  const SQRT_TWO = Math.sqrt(2);
  const X_MIN = -9;
  const X_MAX = 9;
  const STEP = 0.012;
  const SIMULATION_RATE = 0.52;
  const reducedMotion = window.matchMedia(&quot;(prefers-reduced-motion: reduce)&quot;).matches;

  let systems = [];
  let simulationTime = 0;
  let running = !reducedMotion;
  let previousFrame = performance.now();
  let accumulator = 0;
  let gaussianSpare = null;
  let frameRequest = 0;
  let lastSummarySecond = -1;

  function theme() {
    const style = getComputedStyle(root);
    return {
      foreground: style.getPropertyValue(&quot;--foreground&quot;).trim(),
      muted: style.getPropertyValue(&quot;--muted-foreground&quot;).trim(),
      border: style.getPropertyValue(&quot;--border&quot;).trim(),
      particle: style.getPropertyValue(&quot;--viz-series-1&quot;).trim(),
      wave: style.getPropertyValue(&quot;--viz-series-2&quot;).trim()
    };
  }

  function normalRandom() {
    if (gaussianSpare !== null) {
      const value = gaussianSpare;
      gaussianSpare = null;
      return value;
    }
    let u = 0;
    let v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    const radius = Math.sqrt(-2 * Math.log(u));
    const angle = 2 * Math.PI * v;
    gaussianSpare = radius * Math.sin(angle);
    return radius * Math.cos(angle);
  }

  function rk4Step(w, p, h) {
    const derivative = (value, slope) =&gt; [
      slope,
      -2 * SQRT_TWO * slope - 2 * (value * value - value)
    ];
    const [a1, b1] = derivative(w, p);
    const [a2, b2] = derivative(w + h * a1 / 2, p + h * b1 / 2);
    const [a3, b3] = derivative(w + h * a2 / 2, p + h * b2 / 2);
    const [a4, b4] = derivative(w + h * a3, p + h * b3);
    return [
      w + h * (a1 + 2 * a2 + 2 * a3 + a4) / 6,
      p + h * (b1 + 2 * b2 + 2 * b3 + b4) / 6
    ];
  }

  function buildMinimalWave() {
    const growth = -SQRT_TWO + 2;
    const h = 0.004;
    let x = 0;
    let w = 1e-9;
    let p = growth * w;
    let medianX = 0;
    let foundMedian = false;
    const points = [{ x, w }];

    for (let index = 0; index &lt; 18000 &amp;&amp; w &lt; 1 - 1e-10; index += 1) {
      [w, p] = rk4Step(w, p, h);
      x += h;
      if (!foundMedian &amp;&amp; w &gt;= 0.5) {
        medianX = x;
        foundMedian = true;
      }
      if (index % 3 === 0) points.push({ x, w: Math.max(0, Math.min(1, w)) });
    }

    const centered = points.map((point) =&gt; ({ x: point.x - medianX, w: point.w }));

    function valueAt(z) {
      if (z &lt;= centered[0].x) return 0;
      if (z &gt;= centered[centered.length - 1].x) return 1;
      let low = 0;
      let high = centered.length - 1;
      while (high - low &gt; 1) {
        const middle = (low + high) &gt;&gt; 1;
        if (centered[middle].x &lt;= z) low = middle;
        else high = middle;
      }
      const left = centered[low];
      const right = centered[high];
      const amount = (z - left.x) / (right.x - left.x);
      return left.w + amount * (right.w - left.w);
    }

    function quantile(probability) {
      let low = 0;
      let high = centered.length - 1;
      while (high - low &gt; 1) {
        const middle = (low + high) &gt;&gt; 1;
        if (centered[middle].w &lt;= probability) low = middle;
        else high = middle;
      }
      const left = centered[low];
      const right = centered[high];
      const span = Math.max(1e-12, right.w - left.w);
      return left.x + ((probability - left.w) / span) * (right.x - left.x);
    }

    return { valueAt, quantile };
  }

  const minimalWave = buildMinimalWave();

  function median(values) {
    const sorted = [...values].sort((a, b) =&gt; a - b);
    const middle = sorted.length &gt;&gt; 1;
    return sorted.length % 2
      ? sorted[middle]
      : (sorted[middle - 1] + sorted[middle]) / 2;
  }

  function poisson(lambda) {
    const threshold = Math.exp(-lambda);
    let product = 1;
    let count = 0;
    do {
      count += 1;
      product *= Math.random();
    } while (product &gt; threshold);
    return count - 1;
  }

  function newSystem(size) {
    return {
      size,
      particles: Array.from({ length: size }, (_, index) =&gt; {
        const probability = (index + 0.5) / size;
        return minimalWave.quantile(probability) + 0.025 * normalRandom();
      }),
      flash: null
    };
  }

  function stepSystem(system, dt, keepFlash) {
    const diffusion = Math.sqrt(dt);
    for (let index = 0; index &lt; system.size; index += 1) {
      system.particles[index] += diffusion * normalRandom();
    }

    const events = poisson(system.size * dt);
    for (let event = 0; event &lt; events; event += 1) {
      const initiator = Math.floor(Math.random() * system.size);
      let partner = Math.floor(Math.random() * (system.size - 1));
      if (partner &gt;= initiator) partner += 1;
      if (system.particles[initiator] &lt; system.particles[partner]) {
        if (keepFlash) {
          system.flash = {
            from: system.particles[initiator],
            to: system.particles[partner],
            life: 1
          };
        }
        system.particles[initiator] = system.particles[partner];
      }
    }

    if (system.flash) system.flash.life = Math.max(0, system.flash.life - dt * 2.8);
  }

  function centerSystem(system) {
    const center = median(system.particles);
    system.particles = system.particles.map((position) =&gt; position - center);
  }

  function initialize() {
    gaussianSpare = null;
    systems = POPULATIONS.map(newSystem);
    const burnSteps = Math.round(28 / STEP);
    for (let step = 0; step &lt; burnSteps; step += 1) {
      for (const system of systems) stepSystem(system, STEP, false);
      if (step % 250 === 249) systems.forEach(centerSystem);
    }
    systems.forEach(centerSystem);
    simulationTime = 0;
    accumulator = 0;
    previousFrame = performance.now();
    lastSummarySecond = -1;
    draw();
  }

  function resizeCanvas() {
    const rectangle = canvas.getBoundingClientRect();
    const ratio = Math.min(2, window.devicePixelRatio || 1);
    const width = Math.max(1, Math.round(rectangle.width * ratio));
    const height = Math.max(1, Math.round(rectangle.height * ratio));
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
    context.setTransform(ratio, 0, 0, ratio, 0, 0);
    return { width: rectangle.width, height: rectangle.height };
  }

  function drawText(text, x, y, color, align = &quot;left&quot;, weight = 400) {
    const baseSize = parseFloat(getComputedStyle(root).getPropertyValue(&quot;--font-size-base&quot;)) || 14;
    context.fillStyle = color;
    context.font = `${weight} ${Math.max(11, baseSize * 0.78)}px system-ui, sans-serif`;
    context.textAlign = align;
    context.textBaseline = &quot;middle&quot;;
    context.fillText(text, x, y);
  }

  function centeredPositions(system) {
    const center = median(system.particles);
    return {
      center,
      sorted: system.particles.map((position) =&gt; position - center).sort((a, b) =&gt; a - b)
    };
  }

  function profileDistance(sorted) {
    let empiricalIndex = 0;
    let distance = 0;
    for (let sample = 0; sample &lt;= 180; sample += 1) {
      const z = X_MIN + (sample / 180) * (X_MAX - X_MIN);
      while (empiricalIndex &lt; sorted.length &amp;&amp; sorted[empiricalIndex] &lt;= z) empiricalIndex += 1;
      distance = Math.max(distance, Math.abs(empiricalIndex / sorted.length - minimalWave.valueAt(z)));
    }
    return distance;
  }

  function drawEmpirical(sorted, xScale, yScale, color, alpha, dash, width) {
    let firstVisible = 0;
    while (firstVisible &lt; sorted.length &amp;&amp; sorted[firstVisible] &lt; X_MIN) firstVisible += 1;
    let previousProbability = firstVisible / sorted.length;

    context.save();
    context.strokeStyle = color;
    context.globalAlpha = alpha;
    context.lineWidth = width;
    context.setLineDash(dash);
    context.lineCap = &quot;square&quot;;
    context.lineJoin = &quot;miter&quot;;
    context.beginPath();
    context.moveTo(xScale(X_MIN), yScale(previousProbability));
    for (let index = firstVisible; index &lt; sorted.length; index += 1) {
      const z = sorted[index];
      if (z &gt; X_MAX) break;
      const nextProbability = (index + 1) / sorted.length;
      context.lineTo(xScale(z), yScale(previousProbability));
      context.lineTo(xScale(z), yScale(nextProbability));
      previousProbability = nextProbability;
    }
    context.lineTo(xScale(X_MAX), yScale(previousProbability));
    context.stroke();
    context.restore();
  }

  function draw() {
    const { width, height } = resizeCanvas();
    const colors = theme();
    context.clearRect(0, 0, width, height);

    const left = width &lt; 430 ? 34 : 44;
    const right = width &lt; 430 ? 10 : 18;
    const plotWidth = width - left - right;
    const particleAxisY = 94;
    const chartTop = 214;
    const chartBottom = height - 34;
    const chartHeight = Math.max(100, chartBottom - chartTop);
    const xScale = (x) =&gt; left + ((x - X_MIN) / (X_MAX - X_MIN)) * plotWidth;
    const yScale = (value) =&gt; chartBottom - value * chartHeight;
    const profiles = systems.map(centeredPositions);

    drawText(&quot;ONE SPATIAL DIMENSION · N = 128&quot;, left, 14, colors.muted, &quot;left&quot;, 500);
    drawText(&quot;STATIONARY EMPIRICAL CDFs · COMMON MEDIAN CENTERING&quot;, left, chartTop - 26, colors.muted, &quot;left&quot;, 500);
    drawText(&quot;cumulative mass&quot;, width - right, chartTop - 8, colors.muted, &quot;right&quot;);

    context.save();
    context.strokeStyle = colors.border;
    context.lineWidth = 1;
    context.beginPath();
    context.moveTo(left, particleAxisY);
    context.lineTo(width - right, particleAxisY);
    context.stroke();
    context.restore();

    const displayed = systems[1];
    const displayedCenter = profiles[1].center;
    if (displayed.flash &amp;&amp; displayed.flash.life &gt; 0) {
      const fromX = xScale(displayed.flash.from - displayedCenter);
      const toX = xScale(displayed.flash.to - displayedCenter);
      if (toX &gt;= left &amp;&amp; fromX &lt;= width - right) {
        const arcHeight = Math.min(44, Math.max(18, (toX - fromX) * 0.22));
        context.save();
        context.strokeStyle = colors.wave;
        context.fillStyle = colors.wave;
        context.globalAlpha = Math.min(0.85, displayed.flash.life);
        context.lineWidth = 1.5;
        context.beginPath();
        context.moveTo(fromX, particleAxisY);
        context.quadraticCurveTo((fromX + toX) / 2, particleAxisY - arcHeight, toX, particleAxisY);
        context.stroke();
        context.beginPath();
        context.moveTo(toX, particleAxisY);
        context.lineTo(toX - 6, particleAxisY - 4);
        context.lineTo(toX - 4, particleAxisY + 5);
        context.closePath();
        context.fill();
        context.restore();
      }
    }

    context.save();
    context.fillStyle = colors.particle;
    context.globalAlpha = 0.82;
    for (const position of displayed.particles) {
      const z = position - displayedCenter;
      if (z &lt; X_MIN - 0.2 || z &gt; X_MAX + 0.2) continue;
      context.beginPath();
      context.arc(xScale(z), particleAxisY, width &lt; 430 ? 2.2 : 2.6, 0, Math.PI * 2);
      context.fill();
    }
    context.restore();

    for (const tick of [-8, -4, 0, 4, 8]) {
      const x = xScale(tick);
      context.save();
      context.strokeStyle = colors.border;
      context.lineWidth = tick === 0 ? 1.5 : 1;
      context.beginPath();
      context.moveTo(x, particleAxisY - 5);
      context.lineTo(x, particleAxisY + 5);
      context.stroke();
      context.restore();
      drawText(String(tick), x, particleAxisY + 18, colors.muted, &quot;center&quot;);
    }
    drawText(&quot;x − median&quot;, width - right, particleAxisY + 18, colors.muted, &quot;right&quot;);

    context.save();
    context.strokeStyle = colors.border;
    context.lineWidth = 1;
    for (const value of [0, 0.5, 1]) {
      const y = yScale(value);
      context.beginPath();
      context.moveTo(left, y);
      context.lineTo(width - right, y);
      context.stroke();
      drawText(value.toFixed(value === 0.5 ? 1 : 0), left - 8, y, colors.muted, &quot;right&quot;);
    }
    context.restore();

    context.save();
    context.strokeStyle = colors.wave;
    context.lineWidth = 2.8;
    context.lineCap = &quot;round&quot;;
    context.lineJoin = &quot;round&quot;;
    context.beginPath();
    for (let pixel = 0; pixel &lt;= Math.ceil(plotWidth); pixel += 2) {
      const z = X_MIN + (pixel / plotWidth) * (X_MAX - X_MIN);
      const x = xScale(z);
      const y = yScale(minimalWave.valueAt(z));
      if (pixel === 0) context.moveTo(x, y);
      else context.lineTo(x, y);
    }
    context.stroke();
    context.restore();

    drawEmpirical(profiles[0].sorted, xScale, yScale, colors.particle, 0.42, [2, 5], 1.5);
    drawEmpirical(profiles[1].sorted, xScale, yScale, colors.particle, 0.7, [7, 4], 1.8);
    drawEmpirical(profiles[2].sorted, xScale, yScale, colors.particle, 1, [], 2.1);

    for (const tick of [-8, -4, 0, 4, 8]) {
      const x = xScale(tick);
      context.save();
      context.strokeStyle = colors.border;
      context.lineWidth = tick === 0 ? 1.5 : 1;
      context.beginPath();
      context.moveTo(x, chartBottom);
      context.lineTo(x, chartBottom + 5);
      context.stroke();
      context.restore();
      drawText(String(tick), x, chartBottom + 17, colors.muted, &quot;center&quot;);
    }
    drawText(&quot;x − median&quot;, width - right, chartBottom + 17, colors.muted, &quot;right&quot;);

    const distances = profiles.map((profile) =&gt; profileDistance(profile.sorted));
    timeLabel.textContent = `t = ${simulationTime.toFixed(1)}`;
    distanceLabel.textContent = `sup distances  ${distances.map((value, index) =&gt; `N=${POPULATIONS[index]}: ${value.toFixed(3)}`).join(&quot;  ·  &quot;)}`;

    const wholeSecond = Math.floor(simulationTime);
    if (wholeSecond !== lastSummarySecond) {
      lastSummarySecond = wholeSecond;
      summary.textContent = `At time ${simulationTime.toFixed(1)}, the displayed sup distances from the minimal wave are ${distances.map((value, index) =&gt; `${value.toFixed(3)} for N equals ${POPULATIONS[index]}`).join(&quot;, &quot;)}.`;
    }
  }

  function animate(now) {
    const elapsed = Math.min(0.08, (now - previousFrame) / 1000);
    previousFrame = now;
    if (running) {
      accumulator += elapsed * SIMULATION_RATE;
      while (accumulator &gt;= STEP) {
        for (let index = 0; index &lt; systems.length; index += 1) {
          stepSystem(systems[index], STEP, index === 1);
        }
        simulationTime += STEP;
        accumulator -= STEP;
      }
    }
    draw();
    frameRequest = requestAnimationFrame(animate);
  }

  toggleButton.addEventListener(&quot;click&quot;, () =&gt; {
    running = !running;
    toggleButton.textContent = running ? &quot;Pause&quot; : &quot;Play&quot;;
    toggleButton.setAttribute(&quot;aria-pressed&quot;, String(!running));
    previousFrame = performance.now();
  });

  resetButton.addEventListener(&quot;click&quot;, initialize);
  window.addEventListener(&quot;resize&quot;, draw);
  window.addEventListener(&quot;pagehide&quot;, () =&gt; cancelAnimationFrame(frameRequest), { once: true });

  if (reducedMotion) {
    toggleButton.textContent = &quot;Play&quot;;
    toggleButton.setAttribute(&quot;aria-pressed&quot;, &quot;true&quot;);
  }

  initialize();
  frameRequest = requestAnimationFrame(animate);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
